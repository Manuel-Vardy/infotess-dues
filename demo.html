<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demo Data Setup</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
</head>
<body class="bg-light">
    <div class="container">
        <div class="row justify-content-center align-items-center min-vh-100">
            <div class="col-md-6">
                <div class="card shadow">
                    <div class="card-body text-center p-5">
                        <div class="d-flex justify-content-center align-items-center gap-3 mb-4">
                            <img src="images/cropped-AAMUSTED-NEW-LOGO-26-768x221.png" alt="AAMUSTED Logo" style="height: 60px;">
                            <img src="images/infotess logo copy.png" alt="Infotess Logo" style="height: 60px;">
                        </div>
                        <h2 class="mt-3">Demo Data Setup</h2>
                        <p class="text-muted">Initialize the system with sample students and payments for testing</p>
                        
                        <div class="alert alert-info mt-4">
                            <strong>Demo Data Includes:</strong><br>
                            • 8 Sample Students (across all levels)<br>
                            • 4 Sample Payments<br>
                            • Organized by Level (100-400) and Class (A, B, C)
                        </div>
                        
                        <button class="btn btn-primary btn-lg" onclick="loadDemoData()">
                            <i class="bi bi-download"></i> Load Demo Data
                        </button>
                        
                        <button class="btn btn-outline-danger btn-lg ms-2" onclick="clearAllData()">
                            <i class="bi bi-trash"></i> Clear All Data
                        </button>
                        
                        <hr class="my-4">
                        
                        <a href="index.html" class="btn btn-outline-primary">
                            <i class="bi bi-arrow-left"></i> Go to Login
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="js/config.js"></script>
    <script src="js/demo-data.js"></script>
    <script>
        function loadDemoData() {
            if (confirm('This will add sample data to the system. Continue?')) {
                initializeDemoData();
                alert('Demo data loaded successfully!\n\nPlease check your .env file for login credentials.');
                window.location.href = 'index.html';
            }
        }
        
        function clearAllData() {
            if (confirm('Are you sure you want to delete ALL data? This cannot be undone!')) {
                localStorage.clear();
                alert('All data has been cleared!');
                location.reload();
            }
        }
    </script>
</body>
</html>
