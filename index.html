<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>School Dues Management System - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/logo-styles.css">
</head>
<body>
    <div class="login-container">
        <div class="login-card fade-in-up" style="border-radius: var(--radius-lg);">
            <div class="text-center mb-4">
                <div class="logo-container login-logo mb-3">
                    <img src="images/cropped-AAMUSTED-NEW-LOGO-26-768x221.png" alt="AAMUSTED Logo">
                    <img src="images/infotess logo copy.png" alt="Infotess Logo">
                </div>
                <h2 class="mb-2 fw-bold">School Dues System</h2>
                <p class="text-muted">Digital Receipt Management</p>
            </div>
            
            <form id="adminLoginForm">
                <div class="mb-3">
                    <label class="form-label">Admin Email</label>
                    <input type="email" class="form-control-modern" id="adminEmail" placeholder="admin@example.com" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Password</label>
                    <input type="password" class="form-control-modern" id="adminPassword" placeholder="Enter password" required>
                </div>
                <button type="submit" class="btn btn-primary-modern w-100 py-3" style="background: var(--primary-color);">
                    <i class="bi bi-box-arrow-in-right"></i>
                    Admin Login
                </button>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
